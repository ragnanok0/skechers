name: Playwright Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동 실행 버튼

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # Node 버전도 24로 명시
          cache: 'npm' # npm 종속성 캐싱 추가

      - name: Install dependencies
        run: npm ci

      # 1. 현재 설치된 Playwright 버전을 확인하여 캐시 키로 사용
      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

      # 2. 브라우저 캐시 확인 및 복구
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      # 3. 캐시가 없을 때만 브라우저 설치 (chromium만 설치하여 용량 최소화)
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      # 4. 캐시가 있더라도 시스템 의존성(라이브러리 등)은 필요할 수 있으므로 설치
      - name: Install Playwright System Deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PW: ${{ secrets.USER_PW }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
